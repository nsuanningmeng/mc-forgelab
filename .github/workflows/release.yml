name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.3.6)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: win
          # Pin macOS labels and isolate architectures. `macos-latest` is a moving label
          # that can cause nondeterministic ENOENT errors during .app rename.
          - os: macos-15-intel
            platform: mac
            arch: x64
            artifact: mac-x64
          - os: macos-15
            platform: mac
            arch: arm64
            artifact: mac-arm64
          - os: ubuntu-latest
            platform: linux
            artifact: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build --filter=!@mc-forgelab/desktop
      - run: pnpm --filter @mc-forgelab/desktop build
      - name: Show macOS packaging context
        if: matrix.platform == 'mac'
        working-directory: apps/desktop
        run: |
          sw_vers
          uname -m
          node -p "process.platform + ' ' + process.arch"
          pnpm exec electron-builder --version
      - name: Rebuild native modules for Electron
        if: matrix.platform != 'mac'
        run: pnpm exec electron-builder install-app-deps
        working-directory: apps/desktop
      - name: Rebuild native modules for Electron (macOS)
        if: matrix.platform == 'mac'
        run: pnpm exec electron-builder install-app-deps --platform=darwin --arch=${{ matrix.arch }}
        working-directory: apps/desktop
      - name: Package desktop (Windows)
        if: matrix.platform == 'win'
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: pnpm exec electron-builder --win --publish never
        working-directory: apps/desktop
      - name: Package desktop (macOS)
        if: matrix.platform == 'mac'
        env:
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm exec electron-builder --mac dmg zip --${{ matrix.arch }} --publish never
        working-directory: apps/desktop
      - name: Package desktop (Linux)
        if: matrix.platform == 'linux'
        run: pnpm exec electron-builder --linux --publish never
        working-directory: apps/desktop
      - name: Smoke packaged desktop (Linux AppImage)
        if: matrix.platform == 'linux'
        shell: bash
        working-directory: apps/desktop
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y xvfb curl libgtk-3-0 libnss3 libgbm1
          APPIMAGE="$(ls release/*.AppImage | head -n 1)"
          chmod +x "$APPIMAGE"
          LOG="$(mktemp)"
          APPIMAGE_EXTRACT_AND_RUN=1 MC_FORGELAB_HEADLESS=1 xvfb-run -a "$APPIMAGE" --headless --no-sandbox >"$LOG" 2>&1 &
          PID=$!
          trap 'pkill -P "$PID" 2>/dev/null || true; kill "$PID" 2>/dev/null || true; cat "$LOG"' EXIT
          LINE=""
          for i in $(seq 1 30); do
            LINE="$(grep -Eo '\{"port":[0-9]+,"url":"http://127\.0\.0\.1:[0-9]+"\}' "$LOG" | tail -n 1 || true)"
            [ -n "$LINE" ] && break
            sleep 1
          done
          if [ -z "$LINE" ]; then
            echo "startup port JSON not found"
            exit 1
          fi
          PORT="$(node -e 'console.log(JSON.parse(process.argv[1]).port)' "$LINE")"
          BODY="$(curl -fsS "http://127.0.0.1:${PORT}/api/health")"
          node -e 'const b=JSON.parse(process.argv[1]); if (b.storage !== "sqlite" || b.persistent !== true) { console.error(b); process.exit(1); }' "$BODY"
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.artifact }}
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.zip
            apps/desktop/release/*.tar.gz
            apps/desktop/release/latest*.yml
          if-no-files-found: error

  e2e-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build --filter=!@mc-forgelab/desktop
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E tests
        run: pnpm --filter @mc-forgelab/web test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  publish:
    needs: [desktop, docker, e2e-web]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: desktop-*
      - uses: softprops/action-gh-release@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*
          generate_release_notes: true
          overwrite_files: true
