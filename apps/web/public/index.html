<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ForgeLab</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="assets/icon.png">
  <!-- Local vendor files (no CDN dependency for CI stability) -->
  <link rel="stylesheet" href="vendor/github-dark.min.css">
  <script src="vendor/tailwindcss.js"></script>
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="vendor/babel.min.js"></script>
  <script src="vendor/highlight.min.js"></script>

  <style type="text/css">
    :root {
      /* Dark Palette (Default) */
      --mcfl-bg: #0B0F14;
      --mcfl-surface: #111820;
      --mcfl-elevated: #17212B;
      --mcfl-border: #263241;
      --mcfl-tx1: #E6EDF3;
      --mcfl-tx2: #8B949E;
      --mcfl-tx3: #5C6773;
      --mcfl-mc: #4ADE80;
      --mcfl-blue: #60A5FA;
      --mcfl-warn: #FBBF24;
      --mcfl-danger: #F87171;
      --mcfl-bg-log: #060A0E;
      color-scheme: dark;
    }

    [data-theme="light"] {
      /* Light Palette */
      --mcfl-bg: #F5F7FA;
      --mcfl-surface: #FFFFFF;
      --mcfl-elevated: #F0F4F8;
      --mcfl-border: #D9DFE7;
      --mcfl-tx1: #1F2933;
      --mcfl-tx2: #52606D;
      --mcfl-tx3: #828D9A;
      --mcfl-mc: #16A34A;
      --mcfl-blue: #2563EB;
      --mcfl-warn: #D97706;
      --mcfl-danger: #DC2626;
      --mcfl-bg-log: #ECEFF4;
      color-scheme: light;
    }

    body {
      background-color: var(--mcfl-bg);
      color: var(--mcfl-tx1);
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .mcfl-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    
    /* Scrollbar theming */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--mcfl-bg); }
    ::-webkit-scrollbar-thumb { background: var(--mcfl-border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--mcfl-tx3); }

    .mcfl-log {
      background-color: var(--mcfl-bg-log);
      color: var(--mcfl-tx1);
      font-family: ui-monospace, SFMono-Regular, monospace;
    }
  </style>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg: 'var(--mcfl-bg)',
            surface: 'var(--mcfl-surface)',
            elevated: 'var(--mcfl-elevated)',
            border: 'var(--mcfl-border)',
            tx1: 'var(--mcfl-tx1)',
            tx2: 'var(--mcfl-tx2)',
            tx3: 'var(--mcfl-tx3)',
            mc: 'var(--mcfl-mc)',
            blue: 'var(--mcfl-blue)',
            warn: 'var(--mcfl-warn)',
            danger: 'var(--mcfl-danger)',
          },
          fontSize: {
            '2xs': '0.65rem',
          }
        }
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- Libs -->
  <script type="text/babel" src="ui/lib/cx.js"></script>
  <script type="text/babel" src="ui/lib/i18n.js"></script>
  <script type="text/babel" src="ui/lib/api.js"></script>
  <script type="text/babel" src="ui/lib/store.js"></script>
  <script type="text/babel" src="ui/lib/theme.js"></script>
  <script type="text/babel" src="ui/lib/icons.jsx"></script>

  <!-- Components (dependency order: leaf components first, then composites) -->
  <script type="text/babel" src="ui/components/StatusBadge.jsx"></script>
  <script type="text/babel" src="ui/components/ErrorBoundary.jsx"></script>
  <script type="text/babel" src="ui/components/EmptyState.jsx"></script>
  <script type="text/babel" src="ui/components/PageHeader.jsx"></script>
  <script type="text/babel" src="ui/components/MetricCard.jsx"></script>
  <script type="text/babel" src="ui/components/ProjectCard.jsx"></script>
  <script type="text/babel" src="ui/components/CustomSelect.jsx"></script>
  <script type="text/babel" src="ui/components/PromptComposer.jsx"></script>
  <script type="text/babel" src="ui/components/ProviderForm.jsx"></script>
  <script type="text/babel" src="ui/components/ModelProfileForm.jsx"></script>
  <script type="text/babel" src="ui/components/WorkflowStepCard.jsx"></script>
  <script type="text/babel" src="ui/components/MCVersionPicker.jsx"></script>
  <script type="text/babel" src="ui/components/ActivityPanel.jsx"></script>
  <script type="text/babel" src="ui/components/WorkspaceTimeline.jsx"></script>
  <script type="text/babel" src="ui/components/FileTreeView.jsx"></script>
  <script type="text/babel" src="ui/components/FilePreviewPane.jsx"></script>
  <script type="text/babel" src="ui/components/PatchReviewModal.jsx"></script>
  <script type="text/babel" src="ui/components/ArtifactTable.jsx"></script>
  <script type="text/babel" src="ui/components/BuildLogPanel.jsx"></script>
  <script type="text/babel" src="ui/components/MarkdownRenderer.jsx"></script>
  <script type="text/babel" src="ui/components/MessageItem.jsx"></script>
  <!-- Chat-First IDE composites (depend on above) -->
  <script type="text/babel" src="ui/components/ChatColumn.jsx"></script>
  <script type="text/babel" src="ui/components/InspectorColumn.jsx"></script>
  <script type="text/babel" src="ui/components/Sidebar.jsx"></script>
  <script type="text/babel" src="ui/components/Topbar.jsx"></script>
  <script type="text/babel" src="ui/components/AppShell.jsx"></script>

  <!-- Pages (Chat-First IDE: Dashboard/Projects/Workspace/Builds merged into ChatColumn + InspectorColumn) -->
  <script type="text/babel" src="ui/pages/Workflows.jsx"></script>
  <script type="text/babel" src="ui/pages/Artifacts.jsx"></script>
  <script type="text/babel" src="ui/pages/Toolchains.jsx"></script>
  <script type="text/babel" src="ui/pages/Settings.jsx"></script>
  <script type="text/babel" src="ui/pages/Knowledge.jsx"></script>
  <script type="text/babel" src="ui/pages/ProjectDetail.jsx"></script>

  <!-- Main App -->
  <script type="text/babel" src="ui/app.jsx"></script>
</body>
</html>
